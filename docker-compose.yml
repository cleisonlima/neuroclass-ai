
services:

  backend:
    build: ./backend-spring
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  frontend:
    build: ./frontend-react
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - ai-engine
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8080
      - NEXT_PUBLIC_AI_BASE_URL=http://localhost:8000

  ai-engine:
    build: ./ai-engine
    ports:
      - "8000:8000"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: neuroclass
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
